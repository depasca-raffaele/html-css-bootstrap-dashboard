<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo Libro</title>


    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <img src="./img/duck.png" alt="duck logo" class="logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                aria-labelledby="offcanvasDarkNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Catalogo Libri</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end justify-content-lg-start flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex mt-3" role="search">
                        <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search" />
                        <button class="btn btn-dark border-white" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- FORM -->
    <div class="container">
        <div class="row mt-4">
            <div class="col-12">
                <h1 class="fs-3">Nuovo Libro</h1>
            </div>
            <div class="col-6 pt-3">
                <label for="inputName" class="form-label">Nome Autore</label>
                <input type="text" id="inputName" class="form-control" placeholder="Inserisci nome autore">
            </div>
            <div class="col-6 pt-3">
                <label for="inputLastName" class="form-label">Cognome Autore</label>
                <input type="text" id="inputLastName" class="form-control" placeholder="Inserisci cognome autore">
            </div>
            <div class="col-12 pt-3">
                <label for="inputTitle" class="form-label">Titolo</label>
                <input type="text" id="inputTitle" class="form-control" placeholder="Inserisci titolo del libro">
                <div class="form-text">Titolo versione italiana</div>
            </div>
            <div class="col-12 col-lg-4 pt-3">
                <label for="inputGenre" class="form-label">Anno di Pubblicazione</label>
                <select class="form-select" id="inputGenre">
                    <option selected>Scegli il genere</option>
                    <option value="1">Giallo</option>
                    <option value="2">Avventura</option>
                    <option value="3">Horror</option>
                </select>
            </div>
            <div class="col-12 col-lg-4 pt-3">
                <label for="inputYear" class="form-label">Anno di Pubblicazione</label>
                <input type="text" id="inputYear" class="form-control" placeholder="Inserisci l'anno" min="1500"
                    max="2026">
            </div>
            <div class="col-12 col-lg-4 pt-3">
                <label for="inputISBN" class="form-label">ISBN#</label>
                <input type="text" id="inputISBN" class="form-control" placeholder="Inserisci codice ISBN#">
            </div>
        </div>
        <div class="row mb-4">
            <hr class="mt-5 mb-4">
            <div class="col-12">
                <label for="inputNote" class="form-label">Note</label>
                <textarea class="form-control" id="inputNote" rows="3"
                    placeholder="Inserisci eventuali note sul libro"></textarea>
            </div>
            <div class="col-12 pt-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="" />
                    <label class="form-check-label" for="">Disponibile anche in digitale</label>
                </div>
            </div>
            <div class="col pt-3">
                <button type="submit" class="btn btn-primary">
                    Aggiungi Libro
                </button>

            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
